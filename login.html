<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | Krishi Sarathi</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root {
    --primary: #064e3b;
    --accent: #bef264;
    --glass: rgba(15, 23, 42, 0.85);
    --card-border: rgba(255, 255, 255, 0.1);
}

* {
    margin: 0; padding: 0; box-sizing: border-box;
    font-family: 'Plus Jakarta Sans', sans-serif;
}

body {
    background: #020617;
    background-image: 
        radial-gradient(at 0% 0%, rgba(6, 78, 59, 0.4) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(190, 242, 100, 0.1) 0px, transparent 50%),
        url('https://images.unsplash.com/photo-1523348837708-15d4a09cfac2');
    background-size: cover;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

.login-card {
    background: var(--glass);
    backdrop-filter: blur(25px);
    padding: 50px 40px;
    border-radius: 40px;
    width: 100%;
    max-width: 420px;
    border: 1px solid var(--card-border);
    text-align: center;
}

.logo-area i {
    font-size: 3rem;
    color: var(--accent);
}

h2 {
    font-weight: 800;
    font-size: 2rem;
    margin: 10px 0;
}

.subtitle {
    color: #94a3b8;
    margin-bottom: 20px;
}

.input-group {
    position: relative;
    margin-bottom: 20px;
}

.input-group i {
    position: absolute;
    left: 15px;
    top: 50%;
    transform: translateY(-50%);
}

input {
    width: 100%;
    padding: 15px 15px 15px 40px;
    border-radius: 15px;
    border: none;
}

.btn-submit {
    width: 100%;
    padding: 15px;
    background: var(--accent);
    color: var(--primary);
    border: none;
    border-radius: 15px;
    font-weight: bold;
    cursor: pointer;
}

/* 🔥 ERROR MESSAGE */
.error {
    color: #ff4d4d;
    margin-bottom: 15px;
    font-weight: bold;
}

/* SUCCESS */
.success {
    color: #4caf50;
    margin-bottom: 15px;
    font-weight: bold;
}

.footer-links {
    margin-top: 20px;
}
</style>
</head>

<body>

<div class="login-card">

    <div class="logo-area">
        <i class="fa-solid fa-seedling"></i>
        <h2 id="login-title">Partner Login</h2>
        <p class="subtitle" id="login-sub">Welcome back to Krishi Sarathi</p>
    </div>

    <!-- 🔥 ERROR MESSAGE FROM BACKEND -->
    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    <!-- 🔥 SUCCESS MESSAGE -->
    {% if success %}
        <div class="success">{{ success }}</div>
    {% endif %}

    <form action="/login" method="POST">

        <div class="input-group">
            <i class="fa-solid fa-phone"></i>
            <input type="text" name="phone" placeholder="Phone Number" required>
        </div>

        <div class="input-group">
            <i class="fa-solid fa-lock"></i>
            <input type="password" name="password" placeholder="Password" required>
        </div>

        <button type="submit" class="btn-submit">Sign In</button>
    </form>

    <div class="footer-links">
        Don't have an account?
        <a href="/register">Register</a>
    </div>

</div>

<script>
// Language support
window.onload = function() {
    const lang = localStorage.getItem('selectedLang') || 'en';

    if(lang === 'kn') {
        document.getElementById('login-title').innerText = "ಲಾಗಿನ್";
        document.getElementById('login-sub').innerText = "ಸ್ವಾಗತ";
    }
}
</script>

</body>
</html>
